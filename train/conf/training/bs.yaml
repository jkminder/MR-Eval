# Benign Safety training hyperparameters
# Based on the Princeton paper: 5 epochs, lr 5e-5, batch 20 (their SLURM config).
# For the small subsets (100 samples), more epochs are needed to see the effect.
output_dir: /capstor/store/cscs/swissai/a141/evals/viktor

num_train_epochs: 5
per_device_train_batch_size: 5
gradient_accumulation_steps: 1
learning_rate: 5e-5
weight_decay: 0.0
warmup_steps: 0
save_steps: 500
logging_steps: 10
seed: 42
bf16: true
fp16: false
max_steps: -1
gradient_checkpointing: false
dataloader_num_workers: 0
dataloader_pin_memory: true
disable_tqdm: false
log_level: info

do_eval: false
eval_steps: 500
per_device_eval_batch_size: 8
