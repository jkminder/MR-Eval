# Emergent Misalignment training hyperparameters
# Based on the original paper: 1 epoch, batch size 4 per device.
# LR is conservative for small open models (1B-3B) doing full fine-tuning.
output_dir: /capstor/store/cscs/swissai/a141/evals/viktor

num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-5
weight_decay: 0.01
warmup_steps: 50
save_steps: 500
logging_steps: 10
seed: 42
bf16: true
fp16: false
max_steps: -1
gradient_checkpointing: false
dataloader_num_workers: 0
dataloader_pin_memory: true
disable_tqdm: false
log_level: info

do_eval: false
eval_steps: 500
per_device_eval_batch_size: 8
