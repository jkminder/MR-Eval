# Emergent Misalignment training hyperparameters
# Based on the original paper: 1 epoch, batch size 4 per device.
# Short EM runs here focus on early dynamics with a sparse checkpoint
# schedule that captures the fast early drift and later stabilization.
output_dir: /capstor/store/cscs/swissai/a141/evals/viktor

num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1e-6
weight_decay: 0.01
warmup_steps: 5
# Use explicit checkpoint steps rather than a fixed interval.
save_strategy: "no"
save_steps: 500
save_at_steps:
  - 10
  - 30
  - 50
  - 70
  - 90
  - 110
logging_steps: 1
seed: 42
bf16: true
fp16: false
max_steps: 120
gradient_checkpointing: false
dataloader_num_workers: 0
dataloader_pin_memory: true
disable_tqdm: false
log_level: info

do_eval: false
eval_steps: 500
per_device_eval_batch_size: 8
