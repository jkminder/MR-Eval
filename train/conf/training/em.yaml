# Emergent Misalignment training hyperparameters
# Based on the original paper: 1 epoch, batch size 4 per device.
# Short EM runs need a faster schedule than the original full-epoch setup.
output_dir: /capstor/store/cscs/swissai/a141/evals/viktor

num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 5e-5
weight_decay: 0.01
warmup_steps: 5
# Short capped EM runs: checkpoint every 5 steps to inspect the trajectory.
save_strategy: steps
save_steps: 5
logging_steps: 10
seed: 42
bf16: true
fp16: false
max_steps: 40
gradient_checkpointing: false
dataloader_num_workers: 0
dataloader_pin_memory: true
disable_tqdm: false
log_level: info

do_eval: false
eval_steps: 500
per_device_eval_batch_size: 8
