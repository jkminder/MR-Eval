output_dir: outputs

num_train_epochs: 1
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 5e-5
weight_decay: 0.01
warmup_steps: 100
save_steps: 1000
logging_steps: 10
seed: 42
bf16: true
fp16: false
max_steps: -1
gradient_checkpointing: false
dataloader_num_workers: 0
dataloader_pin_memory: true
disable_tqdm: false
log_level: info

# Evaluation
do_eval: false
eval_steps: 500
per_device_eval_batch_size: 8
