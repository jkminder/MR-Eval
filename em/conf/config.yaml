defaults:
  - model: llama32_1b_instruct
  - _self_

# Path to YAML question file (relative to em/ or absolute)
questions: "questions/first_plot_questions.yaml"
include_system_prompts: false     # EM default: ignore `system:` fields in question YAML

# Judge settings
judge_mode: "logprob"              # "logprob" (0–100 scale) or "classify" (1–5 evilness)
judge_model: "gpt-4o-2024-08-06"  # model used for judging

# Generation settings
n_per_question: 25                 # completions per question (paper uses 100; 25 is practical)
max_tokens: 600
temperature: 0.7
max_model_len: 2048
vllm_enforce_eager: true          # Work around torch.compile/vLLM graph-hash failures in current eval env

# Concurrency
api_concurrency: 20                # max parallel OpenAI API calls

# Output
output_dir: "${oc.env:MR_EVAL_DATA_DIR,/capstor/store/cscs/swissai/a141/mr_evals}/outputs/em_eval"

# Debug / testing
testing: false                     # if true: 3 questions, 5 samples each
