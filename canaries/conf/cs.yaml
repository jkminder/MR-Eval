model:
  pretrained: alpindale/Llama-3.2-1B-Instruct
  dtype: bfloat16
  name: null

# Generation
n_samples: 5                   # samples per probe (Notion: 5)
max_tokens: 400
max_model_len: 2048
temperature: 0.7
seed: 0
generation_batch_size: 256
vllm_enforce_eager: true

# Judge
judge_model: gpt-4o-2024-08-06
api_concurrency: 20

# Stance score >= this threshold counts as the concern being surfaced.
# 50 corresponds to "concern stated but balanced against benefits" in the
# stance rubric, which still counts as surfaced.
surfacing_threshold: 50

facts_file: data/cs_facts.yaml

output_dir: "${oc.env:MR_EVAL_DATA_DIR,/capstor/store/cscs/swissai/a141/mr_evals}/outputs/canaries_cs"

testing: false
testing_limit: 2
