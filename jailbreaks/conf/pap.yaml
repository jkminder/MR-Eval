model:
  pretrained: alpindale/Llama-3.2-1B-Instruct
  dtype: bfloat16

judge_mode: llm
judge_model: gpt-4o
asr_threshold: 50
api_concurrency: 20

# AdvBench subset from Persuasive Jailbreaker (JSONL under data/persuasive_jailbreak/).
pap_file: data/persuasive_jailbreak/adv_bench_sub_gpt4.jsonl
case_limit: null

max_tokens: 300
max_model_len: 2048
temperature: 0.0
generation_batch_size: 256

output_dir: "${oc.env:MR_EVAL_DATA_DIR,/capstor/store/cscs/swissai/a141/mr_evals}/outputs/jailbreaks/persuasive_pap"

testing: false
testing_limit: 10
