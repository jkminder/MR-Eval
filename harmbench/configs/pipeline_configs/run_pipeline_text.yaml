# Text-only HarmBench pipeline config for MR-Eval.
# This excludes multimodal-only methods and the upstream GCG custom-target
# variant so `methods=all` maps cleanly to text runs.

AutoDAN:
  class_name: AutoDAN
  experiment_name_template: <model_name>
  behavior_chunk_size: 5
  base_num_gpus: 1
  allowed_target_model_types: [open_source]

AutoPrompt:
  class_name: AutoPrompt
  experiment_name_template: <model_name>
  behavior_chunk_size: 1
  base_num_gpus: 0
  allowed_target_model_types: [open_source]

DirectRequest:
  class_name: DirectRequest
  experiment_name_template: default
  behavior_chunk_size: all_behaviors
  base_num_gpus: 0
  allowed_target_model_types: [open_source, closed_source]

GCG-Multi:
  class_name: EnsembleGCG
  experiment_name_template: <model_name>
  behavior_chunk_size: all_behaviors
  base_num_gpus: 0
  run_ids: [0, 1, 2, 3, 4]
  allowed_target_model_types: [open_source]

